<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace · FARMIX</title>
    <link rel="icon" href="/img/logo.png" />

    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/components.css" />
    <link rel="stylesheet" href="/styles/pages/shared.css" />
    <link rel="stylesheet" href="/styles/pages/marketplace.css" />
    <script type="importmap">{"imports":{"@supabase/supabase-js":"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"}}</script>
  </head>
  <body>
    <div data-app-shell>
      <div data-mount="navbar"></div>

      <main>
        <div class="container">
          <div id="marketplace-root" class="market-layout">
            <aside class="filters" id="market-filters">
              <button
                type="button"
                class="filters-toggle btn btn-ghost"
                data-filters-toggle
                aria-expanded="false"
                aria-controls="market-filters-panel"
              >
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M4 6h16M7 12h10M10 18h4" stroke-linecap="round"/>
                </svg>
                <span data-filters-toggle-label>Show filters</span>
              </button>

              <div class="filters-panel" id="market-filters-panel">
                <section class="card pad">
                  <form id="filters-form" class="filters-grid" novalidate>
                    <label class="stack filters-field">
                      <span class="filters-label">Search</span>
                      <input class="input" name="q" type="search" placeholder="Tomatoes, honey, milk..." autocomplete="off" />
                      <span class="muted filters-hint">Filters update automatically.</span>
                    </label>

                    <div class="filters-row">
                      <label class="stack filters-field">
                        <span class="filters-label">Category</span>
                        <select class="select" name="cat">
                          <option value="">All categories</option>
                        </select>
                      </label>
                      <label class="stack filters-field">
                        <span class="filters-label">Region</span>
                        <select class="select" name="region" id="filter-region">
                          <option value="">All regions</option>
                        </select>
                      </label>
                    </div>

                    <div class="filters-row">
                      <label class="stack filters-field">
                        <span class="filters-label">Min price</span>
                        <input class="input" name="min" type="text" inputmode="decimal" placeholder="0" />
                      </label>
                      <label class="stack filters-field">
                        <span class="filters-label">Max price</span>
                        <input class="input" name="max" type="text" inputmode="decimal" placeholder="100" />
                      </label>
                    </div>

                    <label class="stack filters-field">
                      <span class="filters-label">Sort</span>
                      <select class="select" name="sort">
                        <option value="newest" selected>Newest</option>
                        <option value="price_asc">Price: low to high</option>
                        <option value="price_desc">Price: high to low</option>
                      </select>
                    </label>

                    <label class="filters-check">
                      <input type="checkbox" name="inStock" value="1" />
                      <span data-in-stock-label>In stock only</span>
                    </label>

                    <div class="filters-actions">
                      <button class="btn btn-primary" type="submit" hidden>Apply</button>
                      <button class="btn btn-ghost" type="button" data-reset>Reset</button>
                    </div>
                  </form>
                </section>
              </div>
            </aside>

            <section class="market-results">
              <div class="market-topbar">
                <div class="market-count" data-count></div>
                <div class="market-topbar-end">
                  <div class="currency-toggle" data-currency-toggle role="group" aria-label="Currency">
                    <button type="button" class="currency-toggle-btn is-active" data-currency="GEL" aria-pressed="true" aria-label="GEL">₾</button>
                    <button type="button" class="currency-toggle-btn" data-currency="USD" aria-pressed="false" aria-label="USD">$</button>
                  </div>
                  <div class="market-count" data-page></div>
                </div>
              </div>
              <div class="market-filter-chips" data-filter-chips hidden></div>
              <div data-results aria-live="polite"></div>
              <div class="pager" data-pager></div>
            </section>
          </div>
        </div>
      </main>

      <div data-mount="footer"></div>
    </div>

    <div id="category-modal" class="category-modal" hidden aria-hidden="true">
      <div class="category-modal-card" role="dialog" aria-modal="true" aria-labelledby="category-modal-title">
        <h3 class="category-modal-title" id="category-modal-title">Edit Categories (Admin)</h3>
        <div id="category-list" class="category-modal-list"></div>
        <button id="add-category" class="btn btn-primary" type="button">Add Category</button>
        <div class="category-modal-actions">
          <button id="save-categories" class="btn btn-primary" type="button">Save</button>
          <button id="cancel-modal" class="btn btn-ghost" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <div id="order-modal" class="order-modal-backdrop" hidden aria-hidden="true">
      <div class="order-modal-card" role="dialog" aria-modal="true" aria-labelledby="om-title" aria-describedby="om-meta" tabindex="-1">
        <h3 class="order-modal-title" id="om-title">Order product</h3>
        <p class="order-modal-meta" id="om-meta"></p>
        <div class="order-modal-row">
          <div class="order-modal-field">
            <label for="om-qty">Quantity</label>
            <input class="order-qty-input" id="om-qty" type="number" min="1" step="1" value="1" aria-describedby="om-avail" />
          </div>
          <div class="order-modal-field">
            <label for="om-avail">Available</label>
            <div class="order-modal-avail" id="om-avail">—</div>
          </div>
        </div>
        <div class="order-modal-total-label">Total</div>
        <div class="order-modal-total-val" id="om-total">₾0</div>
        <div class="order-modal-actions">
          <button class="btn btn-ghost" id="om-cancel" type="button">Cancel</button>
          <button class="btn btn-primary" id="om-confirm" type="button">Confirm Order</button>
        </div>
      </div>
    </div>

    <script type="module" src="/scripts/pages/marketplace.page.js"></script>
  </body>
</html>
