<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login · FARMIX</title>
    <link rel="icon" href="/img/logo.png" />
    <link rel="stylesheet" href="/styles/pages/admin.css" />
    <script type="importmap">{"imports":{"@supabase/supabase-js":"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"}}</script>
  </head>
  <body>
    <div class="adm-login-page">
      <div class="adm-login-card">
        <div class="adm-login-logo">
          <img src="/img/logo.png" alt="FARMIX" />
          <span class="adm-login-logo-text">FARMIX</span>
          <span class="adm-login-logo-badge">Admin</span>
        </div>

        <h1 class="adm-login-title">Control Center</h1>
        <p class="adm-login-sub">Sign in with your admin credentials and access key to continue.</p>

        <div class="adm-login-err" id="login-err" role="alert"></div>

        <form id="admin-login-form" novalidate autocomplete="off">
          <div class="adm-field">
            <label class="adm-label" for="email">Email address</label>
            <input class="adm-input" id="email" type="email" name="email"
              placeholder="admin@farmix.com" autocomplete="username" required />
            <div class="adm-field-error" id="email-err"></div>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="password">Password</label>
            <input class="adm-input" id="password" type="password" name="password"
              placeholder="••••••••" autocomplete="current-password" required />
            <div class="adm-field-error" id="password-err"></div>
          </div>

          <div class="adm-field">
            <label class="adm-label" for="access-key">Admin Access Key</label>
            <input class="adm-input" id="access-key" type="password" name="accessKey"
              placeholder="FARMIX-ADMIN-XXXX" autocomplete="off" required />
            <div class="adm-field-error" id="access-key-err"></div>
          </div>

          <button class="adm-btn-primary" type="submit" id="login-btn">Sign in to Admin</button>
        </form>
      </div>
    </div>

    <script type="module" src="/scripts/pages/admin-login.page.js"></script>
  </body>
</html>
