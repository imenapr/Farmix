<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farmer Dashboard · FARMIX</title>
    <link rel="icon" href="/img/logo.png" />

    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/components.css" />
    <link rel="stylesheet" href="/styles/pages/shared.css" />
    <link rel="stylesheet" href="/styles/pages/farmer-dashboard.css" />
    <script type="importmap">{"imports":{"@supabase/supabase-js":"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"}}</script>
  </head>
  <body>
    <div class="fd-shell" data-app-shell>
      <div data-mount="navbar"></div>

      <aside class="fd-sidebar">
        <div class="fd-sidebar-head">
          <img src="/img/full_logo.png" alt="FARMIX" />
          <span class="fd-sidebar-title">Farmer Dashboard</span>
          <span class="fd-sidebar-badge">Farmer</span>
        </div>

        <nav class="fd-nav">
          <button class="fd-nav-item active" data-section="overview" type="button">
            <span class="fd-nav-icon">◈</span> Overview
          </button>
          <button class="fd-nav-item" data-section="listings" type="button">
            <span class="fd-nav-icon">📦</span> My Listings
          </button>
          <button class="fd-nav-item" data-section="messages" type="button">
            <span class="fd-nav-icon">✉</span> Messages
          </button>
          <button class="fd-nav-item" data-section="profile" type="button">
            <span class="fd-nav-icon">👤</span> Profile
          </button>
        </nav>
      </aside>

      <main class="fd-main">
        <div class="fd-topbar">
          <div>
            <h1 class="fd-topbar-title" id="fd-page-title">Overview</h1>
            <p class="fd-topbar-sub" id="fd-page-sub">Your farm activity at a glance.</p>
          </div>
        </div>

        <div class="fd-content" id="fd-root"></div>
      </main>

      <div data-mount="footer"></div>
    </div>

    <script type="module" src="/scripts/pages/farmer-dashboard.page.js"></script>
  </body>
</html>
